version: "3.9"

services:
  backend:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./uploads:/app/uploads
    restart: unless-stopped

  frontend:
    image: python:3.11-slim
    working_dir: /app
    command: >
      sh -c "pip install streamlit==1.35.0 requests==2.32.3 --quiet &&
             streamlit run frontend/app.py --server.port 8501 --server.address 0.0.0.0"
    ports:
      - "8501:8501"
    volumes:
      - ./frontend:/app/frontend
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped
